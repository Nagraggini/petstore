name: Run Selenium API Tests

on:
    push:
    pull_request:
    workflow_dispatch:

permissions:
    contents: write

jobs:
    tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up JDK21
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "21"

            - name: Run Maven Tests
              run: mvn -B clean test -DCI=true

            - name: Upload surefire test reports
              uses: actions/upload-artifact@v4
              with:
                  name: surefire-reports
                  path: target/surefire-reports

            # =========================
            # Generate Allure Report
            # =========================
            - name: Generate Allure Report
              run: ./mvnw allure:report

            # =========================
            # Prepare GitHub Pages folder
            # =========================
            - name: Prepare GitHub Pages folder
              run: |
                  rm -rf public
                  mkdir -p public             
                  cp -r target/site/allure-maven-plugin public/allure-report 2>/dev/null || true
                  cp -r target/site/allure-report public/allure-report 2>/dev/null || true
                  echo "<a href='allure-report/index.html'>Allure</a>" > public/index.html

            # =========================
            # Deploy to GitHub Pages
            # =========================
            - name: Deploy to GitHub Pages
              uses: JamesIves/github-pages-deploy-action@v4
              with:
                  folder: public
                  branch: gh-pages
